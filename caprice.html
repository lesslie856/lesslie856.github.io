<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Georgia","Times New Roman",serif;
}

body{
    background:black;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 背景 */
.bg{
    position:fixed;
    inset:0;
    background:url("src/longgoodbye.png") center/cover no-repeat;
    filter:brightness(0.55) blur(3px);
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

/* 登录框 */
.login{
    text-align:center;
    color:white;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:45px 60px;
    border-radius:22px;
    box-shadow:0 0 50px rgba(0,0,0,0.6);
    animation:fade 1s ease;
}

input{
    margin-top:20px;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    color:white;
    text-align:center;
    font-size:16px;
}

button{
    margin-top:20px;
    padding:10px 30px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:rgba(255,255,255,0.35);
}

/* 内容容器 */
.viewer{
    display:none;
    position:absolute;
    inset:0;
    overflow:auto;
    padding:80px 20px;
    text-align:center;
    animation:fade 1.2s ease;
}

/* 文本框 */
.textbox{
    max-width:800px;
    margin:auto;
    color:#f3f3f3;
    font-size:20px;
    line-height:1.9;
    letter-spacing:1px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(10px);
    padding:60px 70px;
    border-radius:25px;
    box-shadow:0 0 60px rgba(0,0,0,0.8);
    white-space:pre-wrap;
}

/* 动画 */
@keyframes fade{
    from{opacity:0;transform:translateY(15px)}
    to{opacity:1;transform:translateY(0)}
}

/* 滚动条美化 */
.viewer::-webkit-scrollbar{
    width:8px;
}
.viewer::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.2);
    border-radius:10px;
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="login" id="login">
